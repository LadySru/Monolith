<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Monolith Social</title>
  <style>
    :root {
      --bg:       #02000a;
      --bg2:      #06041a;
      --teal:     #00ffe7;
      --green:    #39ff8a;
      --text:     #f0e8ff;
      --text2:    #7a6faa;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; overflow-x: hidden; position: relative; }
    body::after { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 3px); }
    #particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    #cur { width: 12px; height: 12px; background: var(--teal); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
    section { position: relative; z-index: 2; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 64px; display: flex; align-items: center; background: rgba(2,0,10,.97); border-bottom: 1px solid rgba(0,255,231,0.12); padding: 0 48px; }
    .nav-name { font-family: 'Orbitron', monospace; color: var(--text); text-decoration: none; letter-spacing: 2px; }
    .nav-name span { color: var(--teal); }
    #hero { position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 80px 24px 60px; }
    .hero-inner { position: relative; z-index: 2; max-width: 820px; }
    h1 { font-family: 'Orbitron', monospace; font-size: clamp(2.8rem, 8vw, 6rem); margin-bottom: 20px; }
    h1 .line2 { color: var(--teal); }
    .btn-primary { display: inline-flex; align-items: center; gap: 9px; background: rgba(0,255,231,0.1); color: var(--teal); border: 1px solid var(--teal); padding: 13px 28px; text-decoration: none; margin: 10px; transition: all .3s; }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0,255,231,.35); }
    #seals { background: var(--bg2); padding: 22px 48px; position: relative; z-index: 2; }
    .seal { display: inline-block; padding: 6px 14px; border: 1px solid rgba(0,255,231,.15); background: rgba(10,8,24,0.6); margin: 5px; backdrop-filter: blur(10px); }
    section { padding: 96px 0; position: relative; z-index: 2; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 0 48px; }
    h2 { font-family: 'Orbitron', monospace; font-size: 2rem; margin-bottom: 20px; }
    h2 em { color: var(--teal); font-style: normal; }
    .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-top: 40px; }
    .game-card { position: relative; overflow: hidden; aspect-ratio: 2/3; border: 1px solid rgba(0,255,231,.15); background: var(--bg); transition: all .35s cubic-bezier(.34,1.56,.64,1); }
    .game-card:hover { transform: translateY(-12px) scale(1.05); border-color: var(--teal); box-shadow: 0 20px 40px rgba(0,255,231,.2); }
    .game-title { position: absolute; bottom: 10px; left: 10px; right: 10px; font-size: .65rem; color: var(--text); }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div id="cur"></div>

  <nav>
    <a href="#" class="nav-name"><span>⚡</span>MONOLITH</a>
  </nav>

  <section id="hero">
    <div class="hero-inner">
      <h1><span class="line1">MONOLITH</span><span class="line2">SOCIAL</span></h1>
      <p>Join 322 members and 50+ currently online</p>
      <a href="https://discord.gg/ultimate-party-b-a-m-f-863475027214598173" class="btn-primary">→ Join Discord</a>
    </div>
  </section>

  <div id="seals">
    <div class="seal">✓ Verified</div>
    <div class="seal">✓ Anime & Gaming</div>
    <div class="seal">✓ Active</div>
  </div>

  <section id="games" style="padding: 96px 0;">
    <div class="wrap">
      <h2>What We <em>Play</em></h2>
      <div class="games-grid">
        <div class="game-card" style="background: linear-gradient(160deg,#1a0808,#300)"><div class="game-title">Hotline Miami 2</div></div>
        <div class="game-card" style="background: linear-gradient(160deg,#080816,#14143a)"><div class="game-title">Dead by Daylight</div></div>
        <div class="game-card" style="background: linear-gradient(160deg,#001a18,#003530)"><div class="game-title">Hatsune Miku Logic</div></div>
        <div class="game-card" style="background: linear-gradient(160deg,#071a03,#0d3008)"><div class="game-title">The Song of Saya</div></div>
        <div class="game-card" style="background: linear-gradient(160deg,#1a1500,#342900)"><div class="game-title">Death Stranding</div></div>
        <div class="game-card" style="background: linear-gradient(160deg,#1a0808,#300)"><div class="game-title">Invincible vs</div></div>
      </div>
    </div>
  </section>

  <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    
    function getSeason() {
      const month = new Date().getMonth();
      if (month >= 2 && month <= 4) return 'spring';
      if (month >= 5 && month <= 7) return 'summer';
      if (month >= 8 && month <= 10) return 'autumn';
      return 'winter';
    }

    class Particle {
      constructor() {
        const season = getSeason();
        this.x = Math.random() * canvas.width;
        this.y = -10;
        this.size = Math.random() * 4 + 2;
        this.speedY = Math.random() * 2 + 1;
        this.speedX = Math.random() * 1 - 0.5;
        this.opacity = Math.random() * 0.5 + 0.3;
        
        if (season === 'spring') {
          this.color = '#ffb6d9';
        } else if (season === 'summer') {
          this.color = '#ffff99';
        } else if (season === 'autumn') {
          this.color = '#ff6b35';
        } else {
          this.color = '#e0f7ff';
        }
      }

      update() {
        this.y += this.speedY;
        this.x += this.speedX;
        this.opacity -= 0.002;
      }

      draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.opacity;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.globalAlpha = 1;
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      if (Math.random() < 0.05) {
        particles.push(new Particle());
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].opacity <= 0) {
          particles.splice(i, 1);
        }
      }

      requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    const cur = document.getElementById('cur');
    
    document.addEventListener('mousemove', (e) => {
      if (cur) {
        cur.style.left = e.clientX + 'px';
        cur.style.top = e.clientY + 'px';
      }
    });
  </script>
</body>
</html>
